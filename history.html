:root {

.topbar .loc::before { content: '◉'; font-size: 0.55rem; color: #2e6e44; }

/* MASTHEAD */
.masthead {
  background: var(--mast);

nav.primary {

  border-top: 1px solid rgba(255,255,255,0.06);
}

  overflow-x: auto; scrollbar-width: none;
}
nav.primary ul::-webkit-scrollbar { display: none; }
nav.primary li a {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  font-size: 0.74rem; font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: rgba(255,255,255,0.62);
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color 0.18s, border-color 0.18s;
}
nav.primary li a .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
nav.primary li a:hover { color: var(--white); }

}

.section-intro {

.history-label {

  font-size: 0.9rem;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.history-section p:last-child {

}

.timeline-block {
  margin-top: 10px;

  grid-template-columns: 90px minmax(0,1fr);
  gap: 12px;
  margin-bottom: 12px;
}
.timeline-year {
  font-size: 0.8rem;

  color: var(--ink-soft);

  font-size: 0.92rem;

.history-snippets {

.right-col-section {

.right-card-meta {

  color: var(--ink-muted);
}

}
.footer-brand .ft-sub {

}

}
