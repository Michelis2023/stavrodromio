<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #18191a;
  --ink-soft: #36393c;
  --ink-muted: #72777d;
  --bg: #f5f2ed;
  --bg-warm: #ede8df;
  --white: #ffffff;
  --border: #d4cec4;
  --mast: #1e2b1f;
  --mast-mid: #2e4230;
  --rep: #7a1a1a;
  --rep-lt: #a82828;
  --ist: #5a3e10;
  --lao: #1e4a2e;
  --aut: #1a2e5a;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-weight: 300;
  line-height: 1.7;
}
a { color: inherit; text-decoration: none; }
#progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--rep); width: 0; z-index: 300;
  transition: width 0.1s linear;
}

/* TOPBAR */
.topbar {
  background: var(--mast);
  padding: 5px 0;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.05em;
}
.topbar-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
  display: flex; justify-content: space-between; align-items: center;
}
.topbar .loc {
  display: flex; align-items: center; gap: 6px;
  color: rgba(255,255,255,0.65);
}
.topbar .loc::before { content: '◉'; font-size: 0.55rem; color: #2e6e44; }

/* MASTHEAD */
.masthead {
  background: var(--mast);
  border-bottom: 4px solid var(--mast-mid);
  box-shadow: 0 3px 20px rgba(0,0,0,0.25);
  position: sticky;
  top: 0;
  z-index: 100;
}
.mast-brand {
  max-width: 1200px; margin: 0 auto;
  padding: 20px 24px 16px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
}
.site-name h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(1.5rem, 4vw, 2.3rem);
  font-weight: 900; color: var(--white);
  letter-spacing: -0.02em; line-height: 1;
}
.site-name h1 .cross { color: rgba(255,255,255,0.35); font-weight: 300; font-style: italic; margin: 0 2px; }
.site-name .subtitle {
  font-size: 0.75rem; color: rgba(255,255,255,0.45);
  letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; font-weight: 400;
}
.mast-date {
  text-align: right;
}
.mast-date .md-day {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem; font-weight: 700;
  color: rgba(255,255,255,0.18); line-height: 1;
}
.mast-date .md-full {
  font-size: 0.68rem; color: rgba(255,255,255,0.35);
  letter-spacing: 0.06em; margin-top: 3px;
}

/* NAV */
nav.primary {
  background: var(--mast-mid);
  border-top: 1px solid rgba(255,255,255,0.06);
}
nav.primary ul {
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
  display: flex; list-style: none;
  overflow-x: auto; scrollbar-width: none;
}
nav.primary ul::-webkit-scrollbar { display: none; }
nav.primary li a {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  font-size: 0.74rem; font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: rgba(255,255,255,0.62);
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color 0.18s, border-color 0.18s;
}
nav.primary li a .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
nav.primary li a:hover { color: var(--white); }

/* ενεργή σελίδα – λευκή γραμμή μόνο στην Αρχική */
nav.primary li a.nav-active {
  border-bottom-color: #ffffff;
  color: #ffffff;
}

/* MAIN LAYOUT */
.main {
  max-width: 1200px; margin: 32px auto 48px;
  padding: 0 24px 40px;
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr);
  gap: 40px;
}

/* INTRO BLOCK */
.intro-block {
  margin-bottom: 24px;
}
.intro-kicker {
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.intro-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.6rem;
  margin-bottom: 6px;
}
.intro-subtitle {
  font-size: 0.95rem;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.intro-text {
  font-size: 0.9rem;
  color: var(--ink-soft);
}

/* LATEST ARTICLE */
.latest-block {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 16px 18px 18px;
  margin-bottom: 24px;
}
.latest-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--rep);
  margin-bottom: 6px;
}
.latest-meta {
  font-size: 0.72rem;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.latest-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.1rem;
  margin-bottom: 6px;
}
.latest-title a:hover { text-decoration: underline; }
.latest-tags {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.latest-excerpt {
  font-size: 0.9rem;
  color: var(--ink-soft);
}
.latest-link {
  display: inline-flex;
  margin-top: 8px;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--rep);
}

/* COUNTERS */
.counters-wrap {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 18px;
}
.counter {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 10px 12px;
  font-size: 0.78rem;
}
.counter-label {
  font-size: 0.68rem;
  color: var(--ink-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.counter-value {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  margin-top: 4px;
}

/* MAIN FEATURE ("ΚΥΡΙΟ ΘΕΜΑ") */
.feature-block {
  margin-top: 32px;
}
.feature-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.feature-label {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.feature-all-link {
  font-size: 0.74rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.feature-card {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 16px 18px 18px;
  display: grid;
  grid-template-columns: 140px minmax(0, 1fr);
  gap: 14px;
}
.feature-image-wrap {
  overflow: hidden;
  border: 1px solid var(--border);
}
.feature-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.feature-meta-top {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--rep);
  margin-bottom: 4px;
}
.feature-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.3rem;
  margin-bottom: 6px;
}
.feature-title a:hover { text-decoration: underline; }
.feature-tags {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.feature-date {
  font-size: 0.78rem;
  color: var(--ink-muted);
  margin-bottom: 8px;
}
.feature-excerpt {
  font-size: 0.9rem;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.feature-cta {
  display: inline-flex;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--rep);
}

/* RECENT ARTICLES */
.recent-block {
  margin-top: 32px;
}
.recent-label {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8px;
}
.recent-list {
  background: var(--white);
  border: 1px solid var(--border);
}
.recent-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--bg-warm);
  font-size: 0.86rem;
}
.recent-item:last-child { border-bottom: none; }
.recent-item-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.recent-item-title {
  font-weight: 500;
  margin-bottom: 4px;
}
.recent-item-title a:hover { text-decoration: underline; }
.recent-item-excerpt {
  font-size: 0.82rem;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.recent-item-meta {
  font-size: 0.74rem;
  color: var(--ink-muted);
}

/* RIGHT COLUMN: HISTORY, OBSERVATORY, SECTIONS, ABOUT */
.right-col-section {
  margin-bottom: 28px;
}
.right-label {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8px;
}
.right-card {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 14px 16px 16px;
  font-size: 0.86rem;
}
.right-card h3 {
  font-size: 0.98rem;
  font-family: 'Playfair Display', Georgia, serif;
  margin-bottom: 6px;
}
.right-card h3 a:hover { text-decoration: underline; }
.right-card-text {
  font-size: 0.84rem;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.right-card-meta {
  font-size: 0.76rem;
  color: var(--ink-muted);
}

/* OBSERVATORY LIST */
.obs-list {
  list-style: none;
}
.obs-item {
  padding: 9px 0;
  border-bottom: 1px solid var(--bg-warm);
  font-size: 0.8rem;
}
.obs-item:last-child { border-bottom: none; }
.obs-title a:hover { text-decoration: underline; }
.obs-meta {
  font-size: 0.72rem;
  color: var(--ink-muted);
}
.obs-status {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.obs-status.noans { color: var(--rep); }
.obs-status.open { color: #8a5f1e; }
.obs-status.answered { color: #1e4a2e; }

/* SECTIONS GRID */
.sections-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 8px;
}
.section-card {
  border: 1px solid var(--border);
  padding: 8px 10px;
  font-size: 0.8rem;
  background: var(--white);
}
.section-card a:hover { text-decoration: underline; }
.section-count {
  font-size: 0.78rem;
  color: var(--ink-muted);
}

/* ABOUT SITE */
.about-site {
  font-size: 0.84rem;
  color: var(--ink-soft);
}
.about-site p + p { margin-top: 6px; }

/* FOOTER */
footer {
  background: var(--mast);
  color: rgba(255,255,255,0.45);
}
.footer-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 40px 24px 28px;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 36px;
}
.footer-brand h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700;
  color: rgba(255,255,255,0.85);
  margin-bottom: 6px;
}
.footer-brand .ft-sub {
  font-size: 0.7rem; font-style: italic;
  color: rgba(255,255,255,0.3);
  margin-bottom: 12px;
}
.footer-brand p {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  line-height: 1.7;
}
.footer-col h4 {
  font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 12px;
}
.footer-col ul { list-style: none; }
.footer-col li {
  padding: 6px 0;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  display: flex; gap: 5px; align-items: center;
}
.footer-col li:last-child { border-bottom: none; }
.footer-col li::before { content: '›'; opacity: 0.4; }
.footer-col li a { color: inherit; }
.footer-col li:hover { color: rgba(255,255,255,0.75); }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 16px 24px;
  max-width: 1200px; margin: 0 auto;
  display: flex; justify-content: space-between;
  align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 0.7rem;
}
.footer-bottom .copy {
  color: rgba(255,255,255,0.25);
}
.footer-bottom .independence {
  font-style: italic;
  color: rgba(255,255,255,0.22);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
  }
  .counters-wrap {
    grid-template-columns: repeat(2, minmax(0,1fr));
  }
  .footer-inner {
    grid-template-columns: 1fr 1fr;
  }
  .feature-card {
    grid-template-columns: 1fr;
  }
}
@media (max-width: 600px) {
  .main {
    padding: 0 16px 32px;
  }
  .footer-inner {
    grid-template-columns: 1fr;
  }
}
</style>
