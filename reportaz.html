<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #18191a; --ink-soft: #36393c; --ink-muted: #72777d;
  --bg: #f5f2ed; --bg-warm: #ede8df; --white: #ffffff; --border: #d4cec4;
  --mast: #1e2b1f; --mast-mid: #2e4230;
  --rep: #7a1a1a; --rep-lt: #a82828; --rep-bg: #fdf4f4;
  --ist: #5a3e10; --ist-lt: #8a5f1e;
  --lao: #1e4a2e; --lao-lt: #2e6e44;
  --aut: #1a2e5a; --aut-lt: #2a4a8a;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; font-weight: 300; line-height: 1.65; }
a { color: inherit; text-decoration: none; }
#progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--rep); width: 0; z-index: 300; transition: width 0.1s linear; }

/* TOPBAR */
.topbar { background: var(--mast); padding: 5px 0; font-size: 0.7rem; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; }
.topbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
.topbar .loc { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.65); }
.topbar .loc::before { content: '◉'; font-size: 0.55rem; color: var(--lao-lt); }

/* MASTHEAD */
.masthead { background: var(--mast); border-bottom: 4px solid var(--mast-mid); position: sticky; top: 0; z-index: 100; box-shadow: 0 3px 20px rgba(0,0,0,0.25); }
.mast-brand { max-width: 1200px; margin: 0 auto; padding: 20px 24px 16px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
.site-name h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(1.6rem, 5vw, 2.6rem); font-weight: 900; color: var(--white); letter-spacing: -0.02em; line-height: 1; }
.site-name h1 .cross { color: rgba(255,255,255,0.35); font-weight: 300; font-style: italic; margin: 0 2px; }
.site-name .subtitle { font-size: 0.75rem; color: rgba(255,255,255,0.45); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; font-weight: 400; }
.mast-date { text-align: right; }
.mast-date .md-day { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: rgba(255,255,255,0.15); line-height: 1; }
.mast-date .md-full { font-size: 0.68rem; color: rgba(255,255,255,0.3); letter-spacing: 0.06em; margin-top: 3px; }

/* NAV */
nav.primary { background: var(--mast-mid); border-top: 1px solid rgba(255,255,255,0.06); }
nav.primary ul { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; list-style: none; overflow-x: auto; scrollbar-width: none; }
nav.primary ul::-webkit-scrollbar { display: none; }
nav.primary li a { display: flex; align-items: center; gap: 6px; padding: 11px 16px; font-size: 0.74rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.62); white-space: nowrap; border-bottom: 3px solid transparent; transition: color 0.18s, border-color 0.18s; }
nav.primary li a .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
nav.primary li a:hover { color: var(--white); }
nav.primary li a.nav-rep { border-bottom-color: var(--rep-lt); color: white; }
nav.primary li a.nav-ist:hover { border-bottom-color: var(--ist-lt); color: white; }
nav.primary li a.nav-lao:hover { border-bottom-color: var(--lao-lt); color: white; }
nav.primary li a.nav-aut:hover { border-bottom-color: var(--aut-lt); color: white; }

/* HERO */
.page-hero { background: var(--rep); padding: 40px 24px; }
.page-hero-inner { max-width: 1200px; margin: 0 auto; }
.page-hero .ph-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
.page-hero h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; color: var(--white); line-height: 1.2; margin-bottom: 10px; }
.page-hero p { font-size: 0.9rem; color: rgba(255,255,255,0.7); max-width: 600px; }

/* LIST */
.rep-list { max-width: 1200px; margin: 0 auto; padding: 40px 24px 64px; }
.rep-card { background: var(--white); border: 1px solid var(--border); margin-bottom: 20px; display: flex; transition: box-shadow 0.2s; }
.rep-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.rep-card-bar { width: 5px; background: var(--rep); flex-shrink: 0; }
.rep-card-body { padding: 24px 28px; flex: 1; }
.rep-card-body .kicker { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rep); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.rep-card-body .kicker::before { content: ''; display: inline-block; width: 16px; height: 2px; background: var(--rep); }
.rep-card-body .kicker.aut-kicker { color: var(--aut); }
.rep-card-body .kicker.aut-kicker::before { background: var(--aut); }
.rep-card-body h2 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: 700; line-height: 1.3; color: var(--ink); margin-bottom: 10px; transition: color 0.18s; }
.rep-card-body h2:hover { color: var(--rep); }
.rep-card-body h2 a { color: inherit; }
.rep-card-body p { font-size: 0.85rem; color: var(--ink-soft); line-height: 1.75; margin-bottom: 14px; }

/* CARD PHOTOS STRIP */
.card-photos { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; margin: 10px 0 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.card-photos img { height: 90px; width: auto; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; border-radius: 2px; }

.rep-card-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 0.7rem; color: var(--ink-muted); padding-top: 12px; border-top: 1px solid var(--border); }
.cat-pill { padding: 2px 9px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: white; }
.cat-pill.rep { background: var(--rep); }
.cat-pill.aut { background: var(--aut); }
.cat-pill.ist { background: var(--ist); }
.status-noans { color: var(--rep); font-weight: 500; }
.read-btn { display: inline-block; margin-top: 14px; padding: 8px 20px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: white; background: var(--rep); transition: background 0.2s; }
.read-btn:hover { background: var(--rep-lt); }
.read-btn.aut { background: var(--aut); }
.read-btn.aut:hover { background: var(--aut-lt); }

/* FOOTER */
footer { background: var(--mast); color: rgba(255,255,255,0.45); }
.footer-inner { max-width: 1200px; margin: 0 auto; padding: 40px 24px 28px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 36px; }
.footer-brand h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: rgba(255,255,255,0.85); margin-bottom: 6px; }
.footer-brand .ft-sub { font-size: 0.7rem; font-style: italic; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
.footer-brand p { font-size: 0.78rem; color: rgba(255,255,255,0.35); line-height: 1.75; }
.footer-col h4 { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 12px; }
.footer-col ul { list-style: none; }
.footer-col ul li { padding: 6px 0; font-size: 0.78rem; color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: color 0.15s; display: flex; align-items: center; gap: 5px; }
.footer-col ul li:last-child { border-bottom: none; }
.footer-col ul li:hover { color: rgba(255,255,255,0.75); }
.footer-col ul li::before { content: '›'; opacity: 0.4; }
.footer-col ul li a { color: inherit; }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding: 16px 24px; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 0.7rem; }
.footer-bottom .copy { color: rgba(255,255,255,0.25); }
.footer-bottom .independence { font-style: italic; color: rgba(255,255,255,0.22); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .footer-inner { grid-template-columns: 1fr 1fr; }
}
